name: Canonical Contract

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 1"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node scripts/check-canonical-contract.mjs
